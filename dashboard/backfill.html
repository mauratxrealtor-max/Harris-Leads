<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harris County Motivated Seller Leads</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f7cff;
      --accent2: #ff6b35;
      --text: #e2e8f0;
      --muted: #7c8ba1;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--accent2); }
    .meta { color: var(--muted); font-size: 12px; }
    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 130px;
    }
    .stat-card .val { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 10px;
      padding: 0 24px 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input, .controls select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
    }
    .controls input { width: 220px; }
    .controls input:focus, .controls select:focus { border-color: var(--accent); }
    .btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    /* ── Table ── */
    .table-wrap { overflow-x: auto; padding: 0 24px 40px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: var(--surface);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th.sort-asc::after  { content: " ▲"; color: var(--accent); }
    th.sort-desc::after { content: " ▼"; color: var(--accent); }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:hover td { background: rgba(79,124,255,.07); }
    /* score badge */
    .score {
      display: inline-block;
      border-radius: 12px;
      font-weight: 700;
      font-size: 12px;
      padding: 2px 10px;
    }
    .score.high   { background: rgba(34,197,94,.2);  color: var(--green);  }
    .score.mid    { background: rgba(245,158,11,.2); color: var(--yellow); }
    .score.low    { background: rgba(239,68,68,.18); color: var(--red);    }
    /* flags */
    .flag {
      display: inline-block;
      background: rgba(79,124,255,.15);
      border: 1px solid rgba(79,124,255,.3);
      border-radius: 4px;
      font-size: 10px;
      padding: 1px 6px;
      margin: 1px 2px 1px 0;
      white-space: nowrap;
      color: #a5b4fc;
    }
    .flag.red { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.3); color: #fca5a5; }
    /* doc type pill */
    .pill {
      display: inline-block;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      background: rgba(255,107,53,.15);
      color: var(--accent2);
      white-space: nowrap;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty { color: var(--muted); font-style: italic; }
    /* pagination */
    .pagination {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      padding: 5px 11px;
    }
    .pagination button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .page-info { color: var(--muted); font-size: 12px; }
    /* loading / error */
    #status { padding: 40px 24px; text-align: center; color: var(--muted); font-size: 15px; }
    /* modal */
    .modal-bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 640px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal h2 { font-size: 16px; margin-bottom: 16px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-row { display: flex; flex-direction: column; }
    .modal-row .k { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: .06em; }
    .modal-row .v { font-size: 13px; word-break: break-word; }
    .modal-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Harris County <span>Motivated Sellers</span></div>
    <div class="meta" id="meta-line">Loading…</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn" onclick="location.reload()">↺ Refresh</button>
  </div>
</header>

<div id="status">Loading records…</div>

<div id="app" style="display:none">
  <div class="stats" id="stats-bar"></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search owner, address, doc #…" oninput="applyFilters()" />
    <select id="filter-cat" onchange="applyFilters()">
      <option value="">All Lead Types</option>
      <option value="lp">Lis Pendens</option>
      <option value="nofc">Foreclosure</option>
      <option value="taxdeed">Tax Deed</option>
      <option value="jud">Judgment</option>
      <option value="lien">Lien</option>
      <option value="probate">Probate</option>
      <option value="noc">Notice of Commencement</option>
      <option value="rellp">Release LP</option>
    </select>
    <select id="filter-score" onchange="applyFilters()">
      <option value="">All Scores</option>
      <option value="70">Score ≥ 70 (Hot)</option>
      <option value="50">Score ≥ 50</option>
      <option value="30">Score ≥ 30</option>
    </select>
    <select id="filter-addr" onchange="applyFilters()">
      <option value="">All Records</option>
      <option value="1">Has Address</option>
    </select>
    <select id="filter-group" onchange="applyFilters()">
      <option value="">All Filings</option>
      <option value="1">Group by Owner</option>
    </select>
    <button class="btn btn-secondary" onclick="clearFilters()">✕ Clear</button>
    <span class="meta" id="filter-count"></span>
  </div>

  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th onclick="sortBy('score')">Score</th>
          <th onclick="sortBy('doc_type')">Type</th>
          <th onclick="sortBy('filed')">Filed</th>
          <th onclick="sortBy('owner')">Owner (Grantor)</th>
          <th onclick="sortBy('prop_address')">Property Address</th>
          <th onclick="sortBy('mail_address')">Mailing Address</th>
          <th onclick="sortBy('amount')">Amount</th>
          <th>Flags</th>
          <th>Doc #</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Detail modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modal-title">Record Detail</h2>
    <div class="modal-grid" id="modal-body"></div>
  </div>
</div>

<script>
let ALL_RECORDS = [];
let filtered    = [];
let sortCol     = 'score';
let sortDir     = 'desc';
let page        = 1;
const PAGE_SIZE = 50;

/* ── Load data ── */
async function loadData() {
  try {
    const resp = await fetch('backfill.json?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    ALL_RECORDS = data.records || [];

    document.getElementById('meta-line').textContent =
      `Fetched ${data.fetched_at ? new Date(data.fetched_at).toLocaleString() : 'N/A'} · `
      + `${data.date_range?.from || ''} → ${data.date_range?.to || ''}`;

    renderStats(data);
    applyFilters();
    document.getElementById('status').style.display = 'none';
    document.getElementById('app').style.display    = 'block';
  } catch(e) {
    document.getElementById('status').textContent = 'Error loading backfill.json: ' + e.message;
  }
}

/* ── Stats ── */
function renderStats(data) {
  const hot  = ALL_RECORDS.filter(r => r.score >= 70).length;
  const warm = ALL_RECORDS.filter(r => r.score >= 50 && r.score < 70).length;
  const withAddr = data.with_address || 0;
  const html = [
    ['Total Leads', data.total],
    ['Hot (≥70)',   hot],
    ['Warm (50–69)',warm],
    ['With Address',withAddr],
  ].map(([l,v]) => `<div class="stat-card"><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join('');
  document.getElementById('stats-bar').innerHTML = html;
}

/* ── Filters ── */
function applyFilters() {
  const q     = (document.getElementById('search').value || '').toLowerCase();
  const cat   = document.getElementById('filter-cat').value;
  const minS  = parseInt(document.getElementById('filter-score').value) || 0;
  const addrOnly = document.getElementById('filter-addr').value === '1';
  const groupOwner = document.getElementById('filter-group').value === '1';

  let base = ALL_RECORDS.filter(r => {
    if (minS && r.score < minS) return false;
    if (cat  && r.cat !== cat)  return false;
    if (addrOnly && !r.prop_address) return false;
    if (q) {
      const hay = [r.owner, r.doc_num, r.prop_address, r.legal, r.grantee].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  // Group by owner — collapse multiple filings per owner into one row
  if (groupOwner) {
    const ownerMap = new Map();
    for (const r of base) {
      const key = (r.owner || '').toUpperCase().trim();
      if (!ownerMap.has(key)) {
        ownerMap.set(key, {...r, _count: 1});
      } else {
        const existing = ownerMap.get(key);
        existing._count++;
        // Keep highest score
        if (r.score > existing.score) {
          ownerMap.set(key, {...r, _count: existing._count});
        }
        // Merge flags
        const merged = [...new Set([...(existing.flags||[]), ...(r.flags||[])])];
        ownerMap.get(key).flags = merged;
        // Use address if current doesn't have one
        if (!existing.prop_address && r.prop_address) {
          ownerMap.get(key).prop_address = r.prop_address;
          ownerMap.get(key).mail_address = r.mail_address;
        }
      }
    }
    base = Array.from(ownerMap.values());
  }

  filtered = base;
  sortRecords();
  page = 1;
  document.getElementById('filter-count').textContent = `${filtered.length} records`;
  renderPage();
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-cat').value = '';
  document.getElementById('filter-score').value = '';
  document.getElementById('filter-addr').value = '';
  document.getElementById('filter-group').value = '';
  applyFilters();
}

/* ── Sort ── */
function sortBy(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'desc'; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const headers = ['score','doc_type','filed','owner','prop_address','mail_address','amount','','doc_num'];
  const idx = headers.indexOf(col);
  if (idx >= 0) {
    const ths = document.querySelectorAll('#main-table thead th');
    ths[idx]?.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  }
  sortRecords();
  renderPage();
}

function sortRecords() {
  filtered.sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null) av = ''; if (bv == null) bv = '';
    if (typeof av === 'number' && typeof bv === 'number') return sortDir === 'asc' ? av-bv : bv-av;
    return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
}

/* ── Render ── */
function renderPage() {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  page = Math.min(page, totalPages);
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = slice.map((r, i) => rowHTML(r, start + i)).join('');
  renderPagination(total, totalPages);
}

function scoreClass(s) { return s >= 70 ? 'high' : s >= 50 ? 'mid' : 'low'; }

function flagHTML(flags) {
  return (flags || []).map(f => {
    const red = /foreclos|pendens|judgment|tax lien/i.test(f);
    return `<span class="flag${red?' red':''}">${f}</span>`;
  }).join('');
}

function fmtAmt(v) {
  if (!v) return '<span class="empty">—</span>';
  return '$' + Number(v).toLocaleString('en-US', {maximumFractionDigits:0});
}

function rowHTML(r, idx) {
  const addr = [r.prop_address, r.prop_city, r.prop_zip].filter(Boolean).join(', ') || '<span class="empty">—</span>';
  const mail = [r.mail_address, r.mail_city].filter(Boolean).join(', ') || '<span class="empty">—</span>';
  const docLink = r.clerk_url
    ? `<a href="${r.clerk_url}" target="_blank" rel="noopener">${r.doc_num || '—'}</a>`
    : (r.doc_num || '<span class="empty">—</span>');
  const countBadge = r._count > 1
    ? ` <span style="background:#4f7cff22;color:#4f7cff;border-radius:9px;padding:1px 7px;font-size:11px;margin-left:4px">${r._count} filings</span>`
    : '';
  const ownerDisplay = (r.owner || '<span class="empty">—</span>').substring(0, 40) + (r.owner && r.owner.length > 40 ? '...' : '');
  return `<tr onclick="showDetail(${idx})" style="cursor:pointer">
    <td><span class="score ${scoreClass(r.score)}">${r.score}</span></td>
    <td><span class="pill">${r.doc_type}</span></td>
    <td>${r.filed || '<span class="empty">—</span>'}</td>
    <td title="${r.owner||''}">${ownerDisplay}${countBadge}</td>
    <td title="${r.prop_address||''}">${addr}</td>
    <td title="${r.mail_address||''}">${mail}</td>
    <td>${fmtAmt(r.amount)}</td>
    <td>${flagHTML(r.flags)}</td>
    <td>${docLink}</td>
  </tr>`;
}

/* ── Pagination ── */
function renderPagination(total, totalPages) {
  const el = document.getElementById('pagination');
  let html = `<span class="page-info">${total} records · Page ${page}/${totalPages}</span>`;
  html += `<button onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹ Prev</button>`;
  const range = 2;
  for (let p2 = Math.max(1,page-range); p2 <= Math.min(totalPages,page+range); p2++) {
    html += `<button class="${p2===page?'active':''}" onclick="goPage(${p2})">${p2}</button>`;
  }
  html += `<button onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>Next ›</button>`;
  el.innerHTML = html;
}

function goPage(p2) { page = p2; renderPage(); window.scrollTo({top:0,behavior:'smooth'}); }

/* ── Detail modal ── */
function showDetail(localIdx) {
  const r = filtered[(page-1)*PAGE_SIZE + localIdx];
  if (!r) return;
  document.getElementById('modal-title').textContent =
    `${r.cat_label || r.doc_type} — ${r.doc_num || 'N/A'}`;
  const fields = [
    ['Document #',    r.doc_num],
    ['Doc Type',      `${r.doc_type} · ${r.cat_label}`],
    ['Filed Date',    r.filed],
    ['Score',         r.score],
    ['Owner/Grantor', r.owner],
    ['Grantee',       r.grantee],
    ['Amount',        r.amount ? '$' + Number(r.amount).toLocaleString() : '—'],
    ['Legal Desc.',   r.legal],
    ['Prop Address',  [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(', ')],
    ['Mail Address',  [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(', ')],
    ['Flags',         (r.flags||[]).join('; ')],
    ['Clerk URL',     r.clerk_url ? `<a href="${r.clerk_url}" target="_blank">View Document ↗</a>` : '—'],
  ];
  document.getElementById('modal-body').innerHTML = fields.map(([k,v]) =>
    `<div class="modal-row"><span class="k">${k}</span><span class="v">${v || '<em>—</em>'}</span></div>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── CSV export ── */
function exportCSV() {
  const cols = ['score','doc_type','cat_label','filed','owner','grantee','amount','prop_address',
                'prop_city','prop_state','prop_zip','mail_address','mail_city','mail_state','mail_zip',
                'doc_num','flags','clerk_url','legal'];
  const header = cols.join(',');
  const rows = filtered.map(r =>
    cols.map(c => {
      let v = c === 'flags' ? (r.flags||[]).join('; ') : (r[c] ?? '');
      v = String(v).replace(/"/g, '""');
      return `"${v}"`;
    }).join(',')
  );
  const blob = new Blob([header + '\n' + rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `harris_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

loadData();
</script>
</body>
</html>
